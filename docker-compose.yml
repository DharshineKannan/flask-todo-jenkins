services:
 web:
  build: ./
  container_name: todo-app
  ports:
   - "5000:5000"
  environment: 
   - DATABASE_URL=postgresql://tododb_user:${DB_PASSWORD}@db:5432/tododb
  depends_on:
   db:
    condition: service_healthy

 db:
  image: postgres:16-alpine
  container_name: todo-db	
  environment:	
   - POSTGRES_USER=tododb_user
   - POSTGRES_PASSWORD=${DB_PASSWORD}
   - POSTGRES_DB=tododb
  volumes:
   - pg_data:/var/lib/postgresql/data
  healthcheck:
   test: ["CMD-SHELL","pg_isready -U tododb_user"]
   interval: 5s
   retries: 5

volumes:
 pg_data:
